---
# Host-specific configuration for grogu (Lenovo ThinkStation P700)

# PCIe passthrough: Intel Arc A310 + internal HBA (bulk pool) + external HBA (fast pool via MD1220)
# PCI device IDs are placeholders — update after Proxmox install via lspci -nn
pci_device_ids: "8086:56a6,XXXX:XXXX,XXXX:XXXX"
vfio_blacklist_drivers: [i915, xe]

# Intel Arc FLR workaround — clears reset_method before VM start to prevent QEMU hang
# PCI address is a placeholder — update after Proxmox install via lspci -s
intel_arc_pci_addresses: ["0000:XX:00.0"]
intel_arc_vm_ids: [411]

# Proxmox PCI resource mappings (Datacenter > Resource Mappings)
# All values are placeholders — update after Proxmox install via lspci -nn
pci_resource_mappings:
  arc-a310:
    description: "Intel Arc A310 for Jellyfin transcoding"
    device_id: "8086:56a6"
    iommu_group: TBD
    path: "0000:XX:00.0"
    subsystem_id: "XXXX:XXXX"
  truenas-internal-hba:
    description: "Internal HBA for TrueNAS Primary bulk pool (6x drives in P700 bays)"
    device_id: "XXXX:XXXX"
    iommu_group: TBD
    path: "0000:XX:00.0"
    subsystem_id: "XXXX:XXXX"
  truenas-external-hba:
    description: "External HBA for TrueNAS Primary fast pool (MD1220 shelf)"
    device_id: "XXXX:XXXX"
    iommu_group: TBD
    path: "0000:XX:00.0"
    subsystem_id: "XXXX:XXXX"

# 10GbE SFP+ NIC — update interface name after Proxmox install via ip link
primary_interface: "FIXME"

# Allow non-Intel SFP+ transceivers (if using ixgbe driver; skip if using i40e/ice)
configure_ixgbe_unsupported_sfp: false
