---
# Configure TrueNAS SCALE primary storage (VMID 300 on grogu).
# Pools must be created manually via midclt before running this.

- name: Configure TrueNAS SCALE primary (VMID 300)
  hosts: truenas_primary
  become: true

  vars_files:
    - ../vars/datasets.yml
    - ../vars/snapshots.yml
    - ../vars/shares.yml

  environment:
    middleware_method: client

  roles:
    - role: truenas_api_key
    - role: truenas_setup
