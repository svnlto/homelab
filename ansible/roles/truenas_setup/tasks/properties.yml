---
# ZFS properties (via midclt — arensb.truenas doesn't support recordsize/sync/quotas)

- name: Set bulk/kubernetes/nfs-dynamic properties
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.update
      'bulk/kubernetes/nfs-dynamic'
      '{"recordsize": "128K", "quota": 10995116277760}'
  changed_when: false
  tags: [properties, bulk, k8s]

- name: Set bulk/media recordsize to 1M
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.update
      'bulk/media'
      '{"recordsize": "1M"}'
  changed_when: false
  tags: [properties, bulk]

- name: Set bulk/photos recordsize to 1M
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.update
      'bulk/photos'
      '{"recordsize": "1M"}'
  changed_when: false
  tags: [properties, bulk, photos]

- name: Set bulk/backups/timemachine properties
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.update
      'bulk/backups/timemachine'
      '{"quota": 2199023255552, "acltype": "NFSV4", "aclmode": "RESTRICTED"}'
  changed_when: false
  tags: [properties, bulk, backups, timemachine]

- name: Set ssd/kubernetes/nfs-dynamic properties
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.update
      'ssd/kubernetes/nfs-dynamic'
      '{"recordsize": "16K", "quota": 4398046511104}'
  changed_when: false
  tags: [properties, ssd, k8s]

- name: Set ssd/kubernetes/nfs-static recordsize to 128K
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.update
      'ssd/kubernetes/nfs-static'
      '{"recordsize": "128K"}'
  changed_when: false
  tags: [properties, ssd, k8s]

- name: Set ssd/kubernetes/iscsi-zvols properties
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.update
      'ssd/kubernetes/iscsi-zvols'
      '{"compression": "LZ4", "sync": "STANDARD"}'
  changed_when: false
  tags: [properties, ssd, k8s, iscsi]

- name: Set bulk/downloads recordsize to 128K
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.update
      'bulk/downloads'
      '{"recordsize": "128K"}'
  changed_when: false
  tags: [properties, bulk, downloads]
