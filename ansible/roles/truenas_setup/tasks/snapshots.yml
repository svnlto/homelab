---
# Snapshot tasks (query-before-create to avoid duplicates)

- name: Query existing snapshot tasks
  ansible.builtin.command:
    cmd: midclt call pool.snapshottask.query
  register: existing_snapshots
  changed_when: false
  tags: [snapshots]

- name: Build list of existing snapshot task datasets
  ansible.builtin.set_fact:
    existing_snapshot_datasets: >-
      {{ existing_snapshots.stdout | from_json | map(attribute='dataset') | list }}
  tags: [snapshots]

- name: Create snapshot task for bulk/media (daily, keep 7)
  ansible.builtin.command:
    cmd: >
      midclt call pool.snapshottask.create '{
        "dataset": "bulk/media",
        "recursive": true,
        "lifetime_value": 7,
        "lifetime_unit": "DAY",
        "naming_schema": "daily-%Y-%m-%d_%H-%M",
        "schedule": {
          "minute": "0",
          "hour": "2",
          "dom": "*",
          "month": "*",
          "dow": "*"
        },
        "enabled": true
      }'
  when: "'bulk/media' not in existing_snapshot_datasets"
  changed_when: true
  tags: [snapshots]


- name: Create snapshot task for bulk/photos (daily, keep 30)
  ansible.builtin.command:
    cmd: >
      midclt call pool.snapshottask.create '{
        "dataset": "bulk/photos",
        "recursive": true,
        "lifetime_value": 30,
        "lifetime_unit": "DAY",
        "naming_schema": "daily-%Y-%m-%d_%H-%M",
        "schedule": {
          "minute": "0",
          "hour": "3",
          "dom": "*",
          "month": "*",
          "dow": "*"
        },
        "enabled": true
      }'
  when: "'bulk/photos' not in existing_snapshot_datasets"
  changed_when: true
  tags: [snapshots, photos]

- name: Create snapshot task for ssd/kubernetes (hourly, keep 24)
  ansible.builtin.command:
    cmd: >
      midclt call pool.snapshottask.create '{
        "dataset": "ssd/kubernetes",
        "recursive": true,
        "lifetime_value": 24,
        "lifetime_unit": "HOUR",
        "naming_schema": "auto-%Y-%m-%d_%H-%M",
        "schedule": {
          "minute": "0",
          "hour": "*",
          "dom": "*",
          "month": "*",
          "dow": "*"
        },
        "enabled": true
      }'
  when:
    - "'ssd/kubernetes' not in existing_snapshot_datasets"
  changed_when: true
  tags: [snapshots, ssd, k8s]
