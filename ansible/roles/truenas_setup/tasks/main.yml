---
# Configure TrueNAS SCALE primary storage (VMID 300 on grogu).
# Pools (bulk, ssd, scratch) must be created manually via midclt before running this.

- name: Network configuration
  ansible.builtin.include_tasks: network.yml
  tags: [network]

- name: Dataset creation
  ansible.builtin.include_tasks: datasets.yml
  tags: [datasets]

- name: ZFS properties
  ansible.builtin.include_tasks: properties.yml
  tags: [properties]

- name: NFSv4 ACLs
  ansible.builtin.include_tasks: acls.yml
  tags: [acls]

- name: NFS, iSCSI, and SMB shares
  ansible.builtin.include_tasks: shares.yml
  tags: [shares]

- name: Users and groups
  ansible.builtin.include_tasks: users.yml
  tags: [users]

- name: Snapshot tasks
  ansible.builtin.include_tasks: snapshots.yml
  tags: [snapshots]

- name: Scrub tasks
  ansible.builtin.include_tasks: scrubs.yml
  tags: [scrub]
