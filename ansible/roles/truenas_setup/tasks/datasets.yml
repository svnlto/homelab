---
# All pool datasets + acltype/aclmode

# Bulk pool datasets
- name: Create bulk kubernetes parent dataset
  arensb.truenas.filesystem:
    name: "bulk/kubernetes"
    state: present
    compression: "LZ4"
  tags: [datasets, bulk, k8s]

- name: Create bulk kubernetes NFS dynamic dataset
  arensb.truenas.filesystem:
    name: "bulk/kubernetes/nfs-dynamic"
    state: present
    compression: "LZ4"
  tags: [datasets, bulk, k8s]

- name: Create bulk media parent dataset
  arensb.truenas.filesystem:
    name: "bulk/media"
    state: present
    compression: "LZ4"
    atime: "OFF"
  tags: [datasets, bulk]

- name: Create bulk media subdirectories
  ansible.builtin.command:
    cmd: >
      midclt call filesystem.mkdir '{"path": "/mnt/bulk/media/{{ item }}"}'
  loop:
    - music
    - movies
    - tv
    - books
  register: media_dirs
  changed_when: media_dirs.rc == 0
  failed_when: >
    media_dirs.rc != 0
    and 'already exists' not in (media_dirs.stderr | default(''))
    and 'already exists' not in (media_dirs.stdout | default(''))
    and 'exists' not in (media_dirs.stderr | default(''))
  tags: [datasets, bulk]

- name: Create bulk photos dataset (Immich)
  arensb.truenas.filesystem:
    name: "bulk/photos"
    state: present
    compression: "LZ4"
    atime: "OFF"
  tags: [datasets, bulk, photos]

- name: Create bulk backups parent dataset
  arensb.truenas.filesystem:
    name: "bulk/backups"
    state: present
    compression: "ZSTD"
  tags: [datasets, bulk, backups]

- name: Create bulk backup datasets
  arensb.truenas.filesystem:
    name: "bulk/backups/{{ item }}"
    state: present
    compression: "ZSTD"
  loop:
    - proxmox
    - restic-repo
  tags: [datasets, bulk, backups]

- name: Create bulk/backups/timemachine dataset (case-insensitive for macOS)
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.create '{
        "name": "bulk/backups/timemachine",
        "compression": "ZSTD",
        "casesensitivity": "INSENSITIVE",
        "acltype": "NFSV4",
        "aclmode": "PASSTHROUGH"
      }'
  register: tm_dataset_create
  changed_when: tm_dataset_create.rc == 0
  failed_when: >
    tm_dataset_create.rc != 0
    and 'already exists' not in (tm_dataset_create.stderr | default(''))
    and 'already exists' not in (tm_dataset_create.stdout | default(''))
  tags: [datasets, bulk, backups, timemachine]

- name: Create bulk archive dataset
  arensb.truenas.filesystem:
    name: "bulk/archive"
    state: present
    compression: "LZ4"
  tags: [datasets, bulk]

# SSD pool datasets (K8s)
- name: Create ssd kubernetes parent dataset
  arensb.truenas.filesystem:
    name: "ssd/kubernetes"
    state: present
    compression: "LZ4"
  tags: [datasets, ssd, k8s]

- name: Create ssd kubernetes NFS datasets
  arensb.truenas.filesystem:
    name: "ssd/kubernetes/{{ item }}"
    state: present
    compression: "LZ4"
  loop:
    - nfs-dynamic
    - nfs-static
  tags: [datasets, ssd, k8s]

- name: Create ssd kubernetes iSCSI parent dataset
  arensb.truenas.filesystem:
    name: "ssd/kubernetes/iscsi-zvols"
    state: present
    compression: "LZ4"
  tags: [datasets, ssd, k8s, iscsi]

# Bulk pool — downloads (moved from removed scratch pool)
- name: Create bulk downloads parent dataset
  arensb.truenas.filesystem:
    name: "bulk/downloads"
    state: present
    compression: "OFF"
    sync: "DISABLED"
  tags: [datasets, bulk, downloads]

- name: Create bulk downloads subdirectories
  ansible.builtin.command:
    cmd: >
      midclt call filesystem.mkdir '{"path": "/mnt/bulk/downloads/{{ item }}"}'
  loop:
    - incomplete
    - complete
    - complete/torrents
    - complete/usenet
    - complete/soulseek
  register: bulk_dl_dirs
  changed_when: bulk_dl_dirs.rc == 0
  failed_when: >
    bulk_dl_dirs.rc != 0
    and 'already exists' not in (bulk_dl_dirs.stderr | default(''))
    and 'already exists' not in (bulk_dl_dirs.stdout | default(''))
    and 'exists' not in (bulk_dl_dirs.stderr | default(''))
  tags: [datasets, bulk, downloads]

# ACL type/mode on service datasets (must run after dataset creation)
- name: Set acltype/aclmode on service datasets
  ansible.builtin.command:
    cmd: >
      midclt call pool.dataset.update
      '{{ item }}'
      '{"acltype": "NFSV4", "aclmode": "PASSTHROUGH"}'
  changed_when: false
  failed_when: false
  loop:
    - bulk/media
    - bulk/photos
    - bulk/archive
    - bulk/downloads
  tags: [datasets, acls]
