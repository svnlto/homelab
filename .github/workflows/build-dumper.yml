---
name: Build Dumper Image

on:
  push:
    branches:
      - main
    paths:
      - "nix/dumper/**"
      - "nix/flake.nix"
      - "nix/flake.lock"
  workflow_call:
    inputs:
      version:
        description: "Semver tag to apply (e.g. dumper-v1.2.3)"
        required: true
        type: string
    outputs:
      digest:
        description: "Image digest (sha256:...)"
        value: ${{ jobs.build-and-push.outputs.digest }}
      semver:
        description: "Semver tag (e.g. v1.2.3)"
        value: ${{ jobs.build-and-push.outputs.semver }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push OCI Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      semver: ${{ steps.push.outputs.semver }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build image
        run: nix build ./nix#dumper-image

      - name: Load and push image
        id: push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker load < result
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          docker push ghcr.io/svnlto/dumper:latest

          SHA_TAG="ghcr.io/svnlto/dumper:${{ github.sha }}"
          docker tag ghcr.io/svnlto/dumper:latest "${SHA_TAG}"
          docker push "${SHA_TAG}"

          if [ -n "${{ inputs.version }}" ]; then
            # inputs.version is e.g. "dumper-v1.2.3", strip component prefix for semver
            SEMVER="${{ inputs.version }}"
            SEMVER="${SEMVER#dumper-}"
            docker tag ghcr.io/svnlto/dumper:latest "ghcr.io/svnlto/dumper:${SEMVER}"
            docker push "ghcr.io/svnlto/dumper:${SEMVER}"
            echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          fi

          # Capture digest for deploy step
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ghcr.io/svnlto/dumper:latest | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
