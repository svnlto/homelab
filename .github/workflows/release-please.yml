---
name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      dumper-release-created: ${{ steps.release.outputs['nix/dumper--release_created'] }}
      dumper-tag: ${{ steps.release.outputs['nix/dumper--tag_name'] }}
      osxphotos-release-created: ${{ steps.release.outputs['nix/osxphotos-export--release_created'] }}
      osxphotos-tag: ${{ steps.release.outputs['nix/osxphotos-export--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Auto-merge release PR
        if: steps.release.outputs.pr || steps.release.outputs.prs_created == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n '${{ steps.release.outputs.pr }}' ] && [ '${{ steps.release.outputs.pr }}' != '' ]; then
            PR_NUMBER=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')
          else
            # Find existing open release PR
            PR_NUMBER=$(gh pr list --state open --label "autorelease: pending" \
              --json number --jq '.[0].number' --repo "${{ github.repository }}")
          fi
          if [ -n "${PR_NUMBER}" ]; then
            gh pr merge "${PR_NUMBER}" --squash --auto --repo "${{ github.repository }}"
          fi

  build-dumper:
    name: Build Dumper Release
    needs: release-please
    if: needs.release-please.outputs.dumper-release-created == 'true'
    uses: ./.github/workflows/build-dumper.yml
    with:
      version: ${{ needs.release-please.outputs.dumper-tag }}

  deploy-dumper:
    name: Deploy Dumper to Cluster
    needs: [release-please, build-dumper]
    if: needs.release-please.outputs.dumper-release-created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Update values.yaml with new image
        env:
          SEMVER: ${{ needs.build-dumper.outputs.semver }}
          DIGEST: ${{ needs.build-dumper.outputs.digest }}
        run: |
          NEW_TAG="${SEMVER}@${DIGEST}"
          sed -i "s|    tag: .*|    tag: ${NEW_TAG}|" charts/dumper/values.yaml
          echo "Updated dumper image tag to ${NEW_TAG}"
          grep 'tag:' charts/dumper/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/dumper/values.yaml
          git commit -m "chore(dumper): deploy ${{ needs.build-dumper.outputs.semver }} [skip ci]"
          git push

  build-osxphotos-export:
    name: Build OSXPhotos Export Release
    needs: release-please
    if: needs.release-please.outputs.osxphotos-release-created == 'true'
    uses: ./.github/workflows/build-osxphotos-export.yml
    with:
      version: ${{ needs.release-please.outputs.osxphotos-tag }}
