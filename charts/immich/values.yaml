---
global:
  annotations: {}

server:
  image: ghcr.io/immich-app/immich-server:v2.6.3@sha256:0cc1f82953d9598eb9e9dd11cbde1f50fe54f9c46c4506b089e8ad7bfc9d1f0c
  port: 2283
  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
  gpu:
    enabled: false
    renderNode: /dev/dri/renderD128
  nodeSelector: {}
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 8000m
      memory: 8Gi

workers:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 6Gi

machineLearning:
  image: ghcr.io/immich-app/immich-machine-learning:v2.6.3@sha256:33b17015c3d14f2565e9b8cd36b48a70027b14b5cd20da7fbfff21a370b0309c
  port: 3003
  gpu:
    enabled: false
    renderNode: /dev/dri/renderD128
  nodeSelector: {}
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 8Gi

# -- NFS storage for external photo libraries
nfs:
  server: ""
  mountOptions:
    - nfsvers=4.2
    - rsize=1048576
    - wsize=1048576
    - hard
    - noatime
    - nconnect=8
  volumes: []

# -- CSI NFS storage for upload and ml-cache
csi:
  driver: org.democratic-csi.nfs-fast
  storageClassName: truenas-nfs-fast
  server: ""
  basePath: /mnt/fast/kubernetes/nfs-dynamic
  mountOptions:
    - nfsvers=4.2
    - nconnect=8
    - hard
    - noatime
    - nodiratime
  volumes: []

# -- Ingress configuration
ingress:
  enabled: false
  domain: ""
  annotations: {}

# -- External secrets configuration
externalSecret:
  refreshInterval: 1h
  secretStoreName: onepassword
  secretStoreKind: ClusterSecretStore
  targetSecretName: immich-secrets
  onePasswordItem: immich-secrets
  keys:
    - DB_PASSWORD
    - REDIS_PASSWORD
    - IMMICH_SECRET_KEY
