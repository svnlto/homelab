---
global:
  annotations: {}

server:
  image: ghcr.io/immich-app/immich-server:v2.7.4@sha256:040b2fed8f7f6b7405f9b4b26348b4656355e4d4ed0852b8e966d453dd6635cc
  port: 2283
  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
  gpu:
    enabled: false
    renderNode: /dev/dri/renderD128
  nodeSelector: {}
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 8000m
      memory: 8Gi

workers:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 6Gi

machineLearning:
  image: ghcr.io/immich-app/immich-machine-learning:v2.7.4@sha256:e25a410b99567c369da14508c7e874dfbeee1bcf06adda2c4148ab2f32f9463d
  port: 3003
  gpu:
    enabled: false
    renderNode: /dev/dri/renderD128
  nodeSelector: {}
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 8Gi

# -- NFS storage for external photo libraries
nfs:
  server: ""
  mountOptions:
    - nfsvers=4.2
    - rsize=1048576
    - wsize=1048576
    - hard
    - noatime
    - nconnect=8
  volumes: []

# -- CSI NFS storage for upload and ml-cache
csi:
  driver: org.democratic-csi.nfs-fast
  storageClassName: truenas-nfs-fast
  server: ""
  basePath: /mnt/fast/kubernetes/nfs-dynamic
  mountOptions:
    - nfsvers=4.2
    - nconnect=8
    - hard
    - noatime
    - nodiratime
  volumes: []

# -- Ingress configuration
ingress:
  enabled: false
  domain: ""
  annotations: {}

# -- External secrets configuration
externalSecret:
  refreshInterval: 1h
  secretStoreName: onepassword
  secretStoreKind: ClusterSecretStore
  targetSecretName: immich-secrets
  onePasswordItem: immich-secrets
  keys:
    - DB_PASSWORD
    - REDIS_PASSWORD
    - IMMICH_SECRET_KEY
