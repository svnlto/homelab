---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  labels:
    {{- include "immich.labels" (dict "name" "immich-server" "component" "server" "context" .) | nindent 4 }}
  annotations:
    {{- include "immich.annotations" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "immich.selectorLabels" (dict "name" "immich-server" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "immich.selectorLabels" (dict "name" "immich-server" "context" .) | nindent 8 }}
      annotations:
        {{- include "immich.annotations" . | nindent 8 }}
    spec:
      {{- if not .Values.server.gpu.enabled }}
      securityContext:
        runAsUser: {{ .Values.server.securityContext.runAsUser }}
        runAsGroup: {{ .Values.server.securityContext.runAsGroup }}
        fsGroup: {{ .Values.server.securityContext.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
      {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-dragonfly
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z dragonfly.cache.svc.cluster.local 6379; do echo "waiting for dragonfly..."; sleep 2; done']
      containers:
        - name: immich-server
          image: {{ .Values.server.image }}
          {{- if .Values.server.gpu.enabled }}
          securityContext:
            privileged: true
          {{- end }}
          ports:
            - containerPort: {{ .Values.server.port }}
              name: http
          envFrom:
            - configMapRef:
                name: immich-config
          env:
            - name: IMMICH_WORKERS_INCLUDE
              value: api
            {{- if .Values.server.gpu.enabled }}
            - name: LIBVA_RENDER_NODE
              value: {{ .Values.server.gpu.renderNode }}
            {{- end }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.targetSecretName }}
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.targetSecretName }}
                  key: REDIS_PASSWORD
            - name: IMMICH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.targetSecretName }}
                  key: IMMICH_SECRET_KEY
          startupProbe:
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - name: upload
              mountPath: /usr/src/app/upload
            - name: external-libraries
              mountPath: /external-libraries
              readOnly: true
            {{- if .Values.server.gpu.enabled }}
            - name: dev-dri
              mountPath: /dev/dri
            {{- end }}
      volumes:
        - name: upload
          persistentVolumeClaim:
            claimName: immich-upload
        - name: external-libraries
          persistentVolumeClaim:
            claimName: nfs-photos
        {{- if .Values.server.gpu.enabled }}
        - name: dev-dri
          hostPath:
            path: /dev/dri
        {{- end }}
