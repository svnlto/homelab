---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-workers
  labels:
    {{- include "immich.labels" (dict "name" "immich-workers" "component" "workers" "context" .) | nindent 4 }}
  annotations:
    {{- include "immich.annotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.workers.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "immich.selectorLabels" (dict "name" "immich-workers" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "immich.selectorLabels" (dict "name" "immich-workers" "context" .) | nindent 8 }}
      annotations:
        {{- include "immich.annotations" . | nindent 8 }}
    spec:
      {{- if not .Values.server.gpu.enabled }}
      securityContext:
        runAsUser: {{ .Values.server.securityContext.runAsUser }}
        runAsGroup: {{ .Values.server.securityContext.runAsGroup }}
        fsGroup: {{ .Values.server.securityContext.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
      {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: immich-workers
          image: {{ .Values.server.image }}
          {{- if .Values.server.gpu.enabled }}
          securityContext:
            privileged: true
          {{- end }}
          envFrom:
            - configMapRef:
                name: immich-config
          env:
            - name: IMMICH_WORKERS_EXCLUDE
              value: api
            {{- if .Values.server.gpu.enabled }}
            - name: LIBVA_RENDER_NODE
              value: {{ .Values.server.gpu.renderNode }}
            {{- end }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.targetSecretName }}
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.targetSecretName }}
                  key: REDIS_PASSWORD
            - name: IMMICH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecret.targetSecretName }}
                  key: IMMICH_SECRET_KEY
          resources:
            {{- toYaml .Values.workers.resources | nindent 12 }}
          volumeMounts:
            - name: upload
              mountPath: /usr/src/app/upload
            - name: external-libraries
              mountPath: /external-libraries
              readOnly: true
            {{- if .Values.server.gpu.enabled }}
            - name: dev-dri
              mountPath: /dev/dri
            {{- end }}
      volumes:
        - name: upload
          persistentVolumeClaim:
            claimName: immich-upload
        - name: external-libraries
          persistentVolumeClaim:
            claimName: nfs-photos
        {{- if .Values.server.gpu.enabled }}
        - name: dev-dri
          hostPath:
            path: /dev/dri
        {{- end }}
