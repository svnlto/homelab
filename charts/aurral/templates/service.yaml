---
apiVersion: v1
kind: Service
metadata:
  name: aurral
  annotations:
    {{- range $key, $val := .Values.global.annotations }}
    {{ $key }}: {{ $val | quote }}
    {{- end }}
spec:
  ports:
    - port: {{ .Values.aurral.port }}
      targetPort: {{ .Values.aurral.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "aurral.selectorLabels" . | nindent 4 }}
