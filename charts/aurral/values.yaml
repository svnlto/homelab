---
global:
  annotations: {}

aurral:
  image: ghcr.io/lklynet/aurral:latest
  port: 3001
  env:
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"
    - name: TRUST_PROXY
      value: "1"
  # No runAsUser — container starts as root, drops to PUID/PGID internally
  securityContext:
    fsGroup: 1000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- iSCSI storage for SQLite data persistence
iscsi:
  driver: org.democratic-csi.iscsi
  storageClassName: truenas-iscsi-rwo
  portal: ""
  iqnPrefix: iqn.2005-10.org.freenas.ctl:csi-
  iqnSuffix: -shared
  volumes: []

# -- NFS storage for Weekly Flow downloads
nfs:
  server: ""
  mountOptions:
    - nfsvers=4.2
    - rsize=1048576
    - wsize=1048576
    - hard
    - noatime
    - nconnect=8
  volumes: []

# -- External secrets configuration
externalSecret:
  refreshInterval: 1h
  secretStoreName: onepassword
  secretStoreKind: ClusterSecretStore
  targetSecretName: aurral-secrets
  onePasswordItem: aurral-secrets
  keys:
    - LASTFM_API_KEY
    - SOULSEEK_USERNAME
    - SOULSEEK_PASSWORD

# -- Ingress configuration
ingress:
  enabled: false
  domain: ""
  annotations: {}
