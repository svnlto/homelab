---
global:
  annotations: {}

# -- Container image
image:
  repository: ghcr.io/svnlto/osxphotos-export
  tag: latest@sha256:0818642a16b1fae19a23c625f4d4bf4b93cf996681eea41abeecb69963248ff7

# -- Container resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 4Gi

# -- Environment variables
env:
  EXPORT_DB_PATH: /cache/osxphotos_export.db
  SYNC_INTERVAL: "3600"
  RETRY_INTERVAL: "300"
  OTEL_SERVICE_NAME: osxphotos-export

# -- Security context for the container
securityContext:
  runAsUser: 1003
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# -- NFS storage for source and export
nfs:
  server: ""
  mountOptions:
    - nfsvers=4.2
    - rsize=1048576
    - wsize=1048576
    - hard
    - noatime
    - nconnect=8
  volumes: []

# -- CSI storage for cache volume
csi:
  driver: org.democratic-csi.nfs-fast
  storageClassName: truenas-nfs-fast
  server: ""
  basePath: /mnt/fast/kubernetes/nfs-dynamic
  mountOptions:
    - nfsvers=4.2
    - nconnect=8
    - hard
    - noatime
    - nodiratime
  volumes: []

# -- External secrets configuration
externalSecret:
  refreshInterval: 1h
  secretStoreName: onepassword
  secretStoreKind: ClusterSecretStore
  targetSecretName: osxphotos-config
  onePasswordItem: osxphotos-config
  keys:
    - EXPORT_DEST
    - LIBRARY_PATH
