---
global:
  annotations: {}

# -- Navidrome server
navidrome:
  image: deluan/navidrome:0.61.2@sha256:9fa40b3d8dec43ceb2213d1fa551da3dcfef6ac6d19c2e534efb92527c2bafd2
  port: 4533
  env:
    - name: ND_MUSICFOLDER
      value: /music
    - name: ND_DATAFOLDER
      value: /data
    - name: ND_SCANNER_SCHEDULE
      value: "@every 1h"
    - name: ND_LOGLEVEL
      value: info
    - name: ND_ENABLETRANSCODINGCONFIG
      value: "false"
    - name: ND_SESSIONTIMEOUT
      value: "24h"
    - name: ND_ENABLEINSIGHTSCOLLECTOR
      value: "false"
    - name: ND_PROMETHEUS_ENABLED
      value: "true"
    - name: ND_PROMETHEUS_METRICSPATH
      value: /metrics
    - name: ND_IMAGECACHESIZE
      value: "2GB"
    - name: ND_TRANSCODINGCACHESIZE
      value: "500MB"
    - name: ND_BACKUP_COUNT
      value: "5"
    - name: ND_BACKUP_SCHEDULE
      value: "@daily"
    - name: ND_BACKUP_PATH
      value: /data/backups
    - name: ND_AGENTS
      value: lastfm
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- NFS storage for music library
nfs:
  server: ""
  mountOptions:
    - nfsvers=4.2
    - rsize=1048576
    - wsize=1048576
    - hard
    - noatime
    - nconnect=8
  volumes: []

# -- iSCSI storage for app data (SQLite-safe)
iscsi:
  driver: org.democratic-csi.iscsi
  storageClassName: truenas-iscsi-rwo
  portal: ""
  iqnPrefix: iqn.2005-10.org.freenas.ctl:csi-
  iqnSuffix: -shared
  volumes: []

# -- CSI storage for app data
csi:
  driver: org.democratic-csi.nfs-fast
  storageClassName: truenas-nfs-fast
  server: ""
  basePath: /mnt/fast/kubernetes/nfs-dynamic
  mountOptions:
    - nfsvers=4.2
    - nconnect=8
    - hard
    - noatime
    - nodiratime
  volumes: []

# -- Ingress configuration
ingress:
  enabled: false
  domain: ""
  annotations: {}
