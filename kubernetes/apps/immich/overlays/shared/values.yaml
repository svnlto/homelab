---
# Shared cluster overrides

global:
  annotations:
    deployed-by: argocd
    cluster: shared

server:
  gpu:
    enabled: true
    renderNode: /dev/dri/renderD128
  nodeSelector: {}
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 8000m
      memory: 12Gi

workers:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 8000m
      memory: 8Gi

machineLearning:
  image: ghcr.io/immich-app/immich-machine-learning:v2.7.4-openvino
  gpu:
    enabled: true
  nodeSelector: {}
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 8Gi

nfs:
  server: 10.10.10.13
  volumes:
    - name: photos
      pvName: immich-nfs-photos
      pvcName: nfs-photos
      path: /mnt/bulk/photos
      capacity: 2Ti
      accessMode: ReadOnlyMany

csi:
  server: 10.10.10.13
  volumes:
    - pvName: immich-upload
      pvcName: immich-upload
      volumeHandle: pvc-773ef6d7-6526-4549-83ed-82beeb8d978e
      capacity: 50Gi
      accessMode: ReadWriteMany
    - pvName: immich-ml-cache
      pvcName: immich-ml-cache
      volumeHandle: pvc-41372307-5cb6-4296-8bdf-1129a1019c3b
      capacity: 10Gi

ingress:
  enabled: true
  domain: shared.h.svenlito.com
  annotations:
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
