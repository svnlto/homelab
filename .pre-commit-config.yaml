---
default_install_hook_types: [pre-commit, commit-msg]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.git/
      - id: end-of-file-fixer
        exclude: ^\.git/
      - id: check-yaml
        args: [--unsafe]
        exclude: ^charts/.*/templates/
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key

  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        args: ["-conf", ".yamlfmt.yaml"]
        exclude: ^(\.git/|charts/.*/templates/)

  - repo: https://github.com/digitalstudium/helmfmt
    rev: v0.5.0
    hooks:
      - id: helmfmt

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck -x
        language: system
        files: \.sh$

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--fix", "--config", ".markdownlint.yaml"]
        exclude: ^(\.git/|charts/)

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      # Terragrunt infrastructure
      - id: terraform_fmt
        name: Terraform fmt (infrastructure)
        args:
          - --args=-recursive
        files: ^infrastructure/.*\.tf$
        exclude: ^infrastructure/(\.terragrunt-cache|\.terraform-state)/
      - id: terraform_tflint
        name: TFLint (infrastructure)
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
        files: ^infrastructure/.*\.tf$
        exclude: ^infrastructure/(\.terragrunt-cache|\.terraform-state)/

  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible-lint
        entry: env ANSIBLE_CONFIG=ansible/ansible.cfg ansible-lint -c .ansible-lint.yaml ansible/
        language: system
        files: ^ansible/
        pass_filenames: false
        require_serial: true

  - repo: local
    hooks:
      - id: helm-lint
        name: Helm lint (charts)
        entry: bash -c 'rc=0; for chart in charts/*/; do helm lint "$chart" || rc=1; done; exit $rc' --
        language: system
        files: ^charts/
        pass_filenames: false
      - id: helm-template
        name: Helm template (charts)
        entry: bash -c 'rc=0; for chart in charts/*/; do helm template test "$chart" > /dev/null || rc=1; done; exit $rc'
          --
        language: system
        files: ^charts/
        pass_filenames: false
      - id: helm-docs
        name: Helm docs (charts)
        entry: bash -c 'eval "$(direnv export bash 2>/dev/null)"; helm-docs --chart-search-root charts' --
        language: system
        files: ^charts/
        pass_filenames: false
      - id: kubeconform
        name: Kubeconform (charts)
        entry: bash -c 'eval "$(direnv export bash 2>/dev/null)"; rc=0; for chart in charts/*/; do helm template test "$chart"
          2>/dev/null | kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.35.0 || rc=1; done; exit $rc' --
        language: system
        files: ^charts/
        pass_filenames: false
      - id: nixfmt
        name: Format Nix files
        entry: nixfmt
        language: system
        files: \.nix$
      - id: statix
        name: Lint Nix files
        entry: bash -c 'NIX="nix --extra-experimental-features \"nix-command flakes\""; CMD="statix"; command -v statix &>/dev/null
          || CMD="$NIX shell nixpkgs#statix -c statix"; rc=0; for f in "$@"; do eval "$CMD check \"$f\"" || rc=1; done; exit
          $rc' --
        language: system
        files: \.nix$
      - id: deadnix
        name: Find dead Nix code
        entry: bash -c 'NIX="nix --extra-experimental-features \"nix-command flakes\""; CMD="deadnix"; command -v deadnix
          &>/dev/null || CMD="$NIX shell nixpkgs#deadnix -c deadnix"; rc=0; for f in "$@"; do eval "$CMD --fail \"$f\"" ||
          rc=1; done; exit $rc' --
        language: system
        files: \.nix$

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
